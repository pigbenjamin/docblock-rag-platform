name: Build & Push to GHCR

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force rebuild all services (ignore path filter)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

# ──────────────────────────────────────────────────────────────
# Step 1: detect which services have changed
# ──────────────────────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      retrieve-api:     ${{ steps.filter.outputs.retrieve-api }}
      document-api:        ${{ steps.filter.outputs.document-api }}
      ingest-worker:    ${{ steps.filter.outputs.ingest-worker }}
      webhook-service:  ${{ steps.filter.outputs.webhook-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            retrieve-api:
              - 'services/retrieve-api/**'
              - 'libs/docblock-core/**'
            document-api:
              - 'services/document-api/**'
              - 'libs/docblock-core/**'
            ingest-worker:
              - 'services/ingest-worker/**'
              - 'libs/docblock-core/**'
            webhook-service:
              - 'services/webhook-service/**'
              - 'libs/docblock-core/**'

# ──────────────────────────────────────────────────────────────
# Step 2: build & push（only when changed or force_all）
# ──────────────────────────────────────────────────────────────

  build-retrieve-api:
    needs: changes
    if: needs.changes.outputs.retrieve-api == 'true' || inputs.force_all == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/retrieve-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/retrieve-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=retrieve-api
          cache-to: type=gha,mode=max,scope=retrieve-api

  build-document-api:
    needs: changes
    if: needs.changes.outputs.document-api == 'true' || inputs.force_all == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/document-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/document-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=document-api
          cache-to: type=gha,mode=max,scope=document-api

  build-ingest-worker:
    needs: changes
    if: needs.changes.outputs.ingest-worker == 'true' || inputs.force_all == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/ingest-worker
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ingest-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ingest-worker
          cache-to: type=gha,mode=max,scope=ingest-worker

  build-webhook-service:
    needs: changes
    if: needs.changes.outputs.webhook-service == 'true' || inputs.force_all == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/webhook-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/webhook-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=webhook-service
          cache-to: type=gha,mode=max,scope=webhook-service

