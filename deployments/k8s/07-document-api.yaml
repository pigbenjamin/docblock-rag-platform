---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-api
  namespace: docblock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-api
  template:
    metadata:
      labels:
        app: document-api
    spec:
      imagePullSecrets:
        - name: pigbenjamin-ghcr-secret
      containers:
        - name: document-api
          image: ghcr.io/pigbenjamin/docblock-rag-platform/document-api:latest
          ports:
            - containerPort: 8765
          envFrom:
            - configMapRef:
                name: docblock-config
            - secretRef:
                name: docblock-db-secret
            - secretRef:
                name: docblock-app-secret
          volumeMounts:
            - name: ingest-data
              mountPath: /data
      volumes:
        - name: ingest-data
          persistentVolumeClaim:
            claimName: docblock-ingest-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: document-api
  namespace: docblock
spec:
  type: NodePort
  selector:
    app: document-api
  ports:
    - port: 8765
      targetPort: 8765
      nodePort: 31765
