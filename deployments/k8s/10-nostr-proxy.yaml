---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nostr-proxy
  namespace: docblock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nostr-proxy
  template:
    metadata:
      labels:
        app: nostr-proxy
    spec:
      imagePullSecrets:
        - name: pigbenjamin-ghcr-secret
      containers:
        - name: nostr-proxy
          image: ghcr.io/pigbenjamin/docblock-rag-platform/nostr-proxy:latest
          ports:
            - containerPort: 8800
          envFrom:
            - configMapRef:
                name: docblock-config
            - secretRef:
                name: docblock-nostr-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8800
            initialDelaySeconds: 5
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: nostr-proxy
  namespace: docblock
spec:
  type: NodePort
  selector:
    app: nostr-proxy
  ports:
    - port: 8800
      targetPort: 8800
      nodePort: 31800
