---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieve-api
  namespace: docblock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retrieve-api
  template:
    metadata:
      labels:
        app: retrieve-api
    spec:
      imagePullSecrets:
        - name: pigbenjamin-ghcr-secret
      containers:
        - name: retrieve-api
          image: ghcr.io/pigbenjamin/docblock-rag-platform/retrieve-api:latest
          ports:
            - containerPort: 8761
          envFrom:
            - configMapRef:
                name: docblock-config
            - secretRef:
                name: docblock-db-secret
            - secretRef:
                name: docblock-app-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8761
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8761
            initialDelaySeconds: 15
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: retrieve-api
  namespace: docblock
spec:
  type: NodePort
  selector:
    app: retrieve-api
  ports:
    - port: 8761
      targetPort: 8761
      nodePort: 31761
