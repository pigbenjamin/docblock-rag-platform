# nostr-consumer — 無 HTTP port，純 Nostr subscriber
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nostr-consumer
  namespace: docblock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nostr-consumer
  template:
    metadata:
      labels:
        app: nostr-consumer
    spec:
      imagePullSecrets:
        - name: pigbenjamin-ghcr-secret
      terminationGracePeriodSeconds: 15
      containers:
        - name: nostr-consumer
          image: ghcr.io/pigbenjamin/docblock-rag-platform/nostr-consumer:latest
          envFrom:
            - configMapRef:
                name: docblock-config
            - secretRef:
                name: docblock-nostr-secret
            - secretRef:
                name: docblock-app-secret
          env:
            # 覆寫 ConfigMap 的 LITELLM_BASE_URL，直接打 k8s 內部 LiteLLM（litellm namespace）
            - name: LITELLM_BASE_URL
              value: "http://litellm-service.litellm.svc.cluster.local:4000"
          volumeMounts:
            - name: consumer-data
              mountPath: /app/data
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import sqlite3, os, sys
                  c = sqlite3.connect(os.getenv('DATABASE_URL', './data/audit.db'))
                  c.execute('SELECT 1')
                  sys.exit(0)
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: consumer-data
          persistentVolumeClaim:
            claimName: docblock-consumer-pvc
