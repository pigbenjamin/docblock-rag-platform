# litellm-proxy — 僅路由 marker/pdf-to-md，內部使用
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: docblock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      imagePullSecrets:
        - name: pigbenjamin-ghcr-secret
      containers:
        - name: litellm-proxy
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: docblock-app-secret
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: litellm_config.yaml
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: docblock
data:
  litellm_config.yaml: |
    model_list:
      - model_name: marker/pdf-to-md
        litellm_params:
          model: openai/marker-pdf-to-md
          api_base: http://marker-service.litellm.svc.cluster.local:8766/v1
          api_key: "none"
    litellm_settings:
      request_timeout: 1860
      drop_params: true
    general_settings:
      master_key: "sk-litellm-internal"

---
apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: docblock
spec:
  selector:
    app: litellm-proxy
  ports:
    - port: 4000
      targetPort: 4000
