# docblock-rag-platform  —  local dev compose

services:

  # ── PostgreSQL ────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai-x}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-acl_FIRDI}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5437}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai-x}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Webhook Service (Keycloak user sync) ──
  webhook-service:
    build:
      context: ../..
      dockerfile: services/webhook-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8763:8763"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Retrieve API (REST + MCP) ─────────────
  retrieve-api:
    build:
      context: ../..
      dockerfile: services/retrieve-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8761:8761"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Ingest Worker ─────────────────────────
  ingest-worker:
    build:
      context: ../..
      dockerfile: services/ingest-worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # marker/pdf-to-md 走 k8s litellm-service（直連，不走 Nostr 避免 timeout）
      LITELLM_PROXY_URL: http://10.90.20.55:30400
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8762:8762"
    volumes:
      - /home/ai-x/data/docblock/ingest:/data
    depends_on:
      postgres:
        condition: service_healthy

  # ── Admin API ─────────────────────────────
  admin-api:
    build:
      context: ../..
      dockerfile: services/admin-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8765:8765"
    volumes:
      - /home/ai-x/data/docblock/ingest:/data
    depends_on:
      postgres:
        condition: service_healthy
      ingest-worker:
        condition: service_started

  # ── Nostr Proxy (embedding / rerank / chat via Nostr) ─────────
  nostr-proxy:
    build:
      context: ../..
      dockerfile: services/nostr-proxy/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8800:8800"

  # ── Nostr Consumer (relay subscriber → LiteLLM) ───────────────
  nostr-consumer:
    build:
      context: ../..
      dockerfile: services/nostr-consumer/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # consumer 直連 k8s litellm-service（embedding/rerank/chat/marker 全部由此路由）
      LITELLM_BASE_URL: http://10.90.20.55:30400
      PYTHONUNBUFFERED: "1"
    volumes:
      - nostr_consumer_data:/app/data
    stop_grace_period: 15s
    depends_on:
      - nostr-proxy

volumes:
  postgres_data:
  nostr_consumer_data:
